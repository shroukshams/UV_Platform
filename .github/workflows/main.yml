name: VU Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0 # يمكنك تغيير الإصدار حسب الحاجة

      - name: Build Docker Images
        run: |
          docker build -t vu-ai-service ./services/ai-service
          docker build -t vu-backend ./services/backend

      - name: Run Infrastructure Check
        run: |
          cd infrastructure
          terraform init -backend=false
          terraform fmt -check
